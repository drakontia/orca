name: Bug report
description: Report a problem with Orca
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for Orca bugs. Include enough detail for someone else to reproduce the issue.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Orca crashes when opening a repository with a nested package.json
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: orca_version
    attributes:
      label: Orca version
      description: Include the exact Orca version if you know it
      placeholder: v0.14.2
    validations:
      required: true

  - type: input
    id: coding_harness
    attributes:
      label: Coding harness and version
      description: Optional. Include the harness or host environment if relevant.
      placeholder: Cursor 1.8.6, Claude Code 0.2.14, Codex CLI 0.34.0
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps needed to reproduce the bug
      placeholder: |
        1. Open Orca
        2. Connect to a repository
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: Orca should continue normally and use the correct project settings.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: Orca fails with ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or additional context
      description: Paste any relevant logs, stack traces, screenshots, or other context
      render: shell
    validations:
      required: false
